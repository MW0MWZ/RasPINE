# .github/workflows/build-raspios-packages.yml
name: Build RasPiOS Kernel DEB as APKs

on:
  workflow_dispatch:
    inputs:
      raspios_dist:
        description: 'Raspberry Pi OS distribution'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - bullseye
      alpine_version:
        description: 'Alpine version to build for'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - '3.22'
          - '3.21'
      package_types:
        description: 'Which packages to fetch'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - kernel-only
          - firmware-only

# Prevent concurrent runs
concurrency:
  group: raspios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      alpine_versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Determine Alpine versions to build
        id: versions
        run: |
          if [ "${{ github.event.inputs.alpine_version }}" = "all" ]; then
            echo 'versions=["3.22","3.21"]' >> $GITHUB_OUTPUT
          else
            echo 'versions=["${{ github.event.inputs.alpine_version }}"]' >> $GITHUB_OUTPUT
          fi

  fetch-and-convert:
    name: Fetch RasPiOS ${{ matrix.arch }} for Alpine ${{ matrix.alpine_version }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [armhf, aarch64]
        alpine_version: ${{ fromJson(needs.prepare.outputs.alpine_versions) }}
        include:
          - arch: armhf
            platform: linux/arm/v6
            variants: "v6 v7 v7l"
          - arch: aarch64
            platform: linux/arm64
            variants: "v8"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Fetch Raspberry Pi OS packages
        id: fetch
        env:
          RASPIOS_DIST: ${{ github.event.inputs.raspios_dist }}
          ARCH: ${{ matrix.arch }}
          VARIANTS: ${{ matrix.variants }}
          PACKAGE_TYPES: ${{ github.event.inputs.package_types }}
        run: |
          chmod +x scripts/raspios-fetch.sh
          ./scripts/raspios-fetch.sh

      - name: Extract and organize packages
        env:
          ARCH: ${{ matrix.arch }}
          VARIANTS: ${{ matrix.variants }}
          KERNEL_VERSION: ${{ steps.fetch.outputs.kernel_version }}
        run: |
          chmod +x scripts/raspios-extract.sh
          ./scripts/raspios-extract.sh

      - name: Create APKBUILDs
        env:
          ARCH: ${{ matrix.arch }}
          VARIANTS: ${{ matrix.variants }}
          KERNEL_VERSION: ${{ steps.fetch.outputs.kernel_version }}
          ALPINE_VERSION: ${{ matrix.alpine_version }}
        run: |
          chmod +x scripts/raspios-apkbuild.sh
          ./scripts/raspios-apkbuild.sh

      - name: Build APK packages
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          ALPINE_VERSION: ${{ matrix.alpine_version }}
        run: |
          chmod +x scripts/raspios-build-apk.sh
          ./scripts/raspios-build-apk.sh
      
      # DO NOT GENERATE INDEX HERE - Just like the original workflow
      # We'll generate it after merging with existing packages in deploy job

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raspios-packages-alpine${{ matrix.alpine_version }}-${{ matrix.arch }}
          path: repo/
          retention-days: 7

  deploy:
    name: Deploy Raspberry Pi OS APKs to GitHub Pages
    needs: [prepare, fetch-and-convert]
    runs-on: ubuntu-latest
    if: |
      always() && 
      needs.fetch-and-convert.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Merge artifacts with existing packages
        run: |
          # Start with empty deploy directory
          mkdir -p deploy
          
          # First, copy ALL existing content from gh-pages (including old packages)
          if [ -d "gh-pages" ]; then
            echo "Copying existing repository content from gh-pages..."
            cp -r gh-pages/* deploy/ 2>/dev/null || true
            
            # Remove old APKINDEX files - we'll regenerate them with ALL packages
            find deploy -name "APKINDEX.tar.gz" -type f -delete 2>/dev/null || true
            echo "Removed old APKINDEX files for regeneration"
          fi
          
          # Now merge in the NEW packages from artifacts (this adds to existing)
          for arch_dir in artifacts/raspios-packages-*/; do
            if [ -d "$arch_dir" ]; then
              echo "Merging new builds from $arch_dir"
              # Copy repo structure, merging with existing
              if [ -d "$arch_dir/repo" ]; then
                cp -r "$arch_dir/repo/"* deploy/ 2>/dev/null || true
              else
                cp -r "$arch_dir"/* deploy/ 2>/dev/null || true
              fi
            fi
          done
          
          # Special handling: Copy aarch64 v8 packages to armhf repository too
          for version in 3.22 3.21; do
            SOURCE_DIR="deploy/v${version}/community/aarch64"
            DEST_DIR="deploy/v${version}/community/armhf"
            
            if [ -d "$SOURCE_DIR" ]; then
              mkdir -p "$DEST_DIR"
              # Copy v8 packages to armhf
              for pkg in "$SOURCE_DIR"/raspios-kernel-v8*.apk; do
                if [ -f "$pkg" ]; then
                  echo "Copying $(basename "$pkg") to armhf repository"
                  cp "$pkg" "$DEST_DIR/"
                fi
              done
            fi
          done
          
          # Ensure public key is present
          cp keys/raspine.rsa.pub deploy/hamradio.rsa.pub 2>/dev/null || true
          
          # Update static files
          cp CNAME deploy/ 2>/dev/null || true
          cp index.html deploy/ 2>/dev/null || true
          cp _config.yml deploy/ 2>/dev/null || true
          
          echo "Repository structure after merge:"
          for version in 3.22 3.21; do
            echo "Alpine $version:"
            for arch in x86_64 armhf aarch64; do
              if [ -d "deploy/v$version/community/$arch" ]; then
                count=$(find "deploy/v$version/community/$arch" -name "*.apk" 2>/dev/null | wc -l)
                size=$(du -sh "deploy/v$version/community/$arch" 2>/dev/null | cut -f1)
                echo "  $arch: $count total packages ($size)"
              fi
            done
          done

      - name: Generate repository indexes for ALL packages
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          set -e
          
          echo "Generating fresh APKINDEX for ALL packages"
          
          # Generate indexes for each Alpine version and architecture
          for VERSION in 3.22 3.21; do
            for ARCH in x86_64 armhf aarch64; do
              REPO_DIR="deploy/v${VERSION}/community/${ARCH}"
              
              if [ ! -d "$REPO_DIR" ]; then
                echo "Directory $REPO_DIR does not exist, skipping..."
                continue
              fi
              
              # Count packages
              PACKAGE_COUNT=$(find "$REPO_DIR" -maxdepth 1 -name "*.apk" -type f 2>/dev/null | wc -l)
              
              if [ "$PACKAGE_COUNT" -eq 0 ]; then
                echo "No packages found in $REPO_DIR, skipping..."
                continue
              fi
              
              echo "::group::Generating index for Alpine $VERSION $ARCH ($PACKAGE_COUNT packages)"
              
              # Determine Docker platform
              case "$ARCH" in
                x86_64)
                  PLATFORM="linux/amd64"
                  ;;
                armhf)
                  PLATFORM="linux/arm/v6"
                  ;;
                aarch64)
                  PLATFORM="linux/arm64"
                  ;;
              esac
              
              # Create temp directory for keys
              TEMP_DIR=$(mktemp -d)
              trap "rm -rf $TEMP_DIR" EXIT
              
              echo "$APK_PRIVATE_KEY" > "$TEMP_DIR/hamradio.rsa"
              cp keys/raspine.rsa.pub "$TEMP_DIR/"
              
              # Generate index in Docker for ALL packages in the directory
              docker run --rm \
                --platform "$PLATFORM" \
                -v "$TEMP_DIR:/keys:ro" \
                -v "$(pwd)/$REPO_DIR:/repo" \
                "alpine:${VERSION}" \
                sh -c '
                  set -e
                  # Enable community repository
                  echo "https://dl-cdn.alpinelinux.org/alpine/v'${VERSION}'/community" >> /etc/apk/repositories
                  apk update
                  apk add --no-cache alpine-sdk
                  mkdir -p /root/.abuild
                  echo "PACKAGER_PRIVKEY=\"/keys/hamradio.rsa\"" > /root/.abuild/abuild.conf
                  cp /keys/raspine.rsa.pub /etc/apk/keys/
                  cd /repo
                  
                  # Remove any stale index files
                  rm -f APKINDEX.tar.gz APKINDEX.unsigned.tar.gz
                  
                  # List all packages that will be indexed
                  echo "Indexing the following packages:"
                  ls -1 *.apk | sort
                  
                  # Generate fresh index for ALL packages
                  apk index -o APKINDEX.unsigned.tar.gz *.apk
                  abuild-sign -k /keys/hamradio.rsa APKINDEX.unsigned.tar.gz
                  mv APKINDEX.unsigned.tar.gz APKINDEX.tar.gz
                  
                  # Verify the index
                  echo "Index created, verifying package count:"
                  tar -xzOf APKINDEX.tar.gz APKINDEX | grep -c "^P:" || true
                  echo " packages in index"
                '
              
              echo "Repository index generated for Alpine $VERSION $ARCH"
              ls -la "$REPO_DIR"/APKINDEX.tar.gz
              
              # Clean up temp directory
              rm -rf "$TEMP_DIR"
              
              echo "::endgroup::"
            done
          done
          
          # Generate repository statistics
          echo "# Repository Statistics" > deploy/STATS.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> deploy/STATS.md
          echo "" >> deploy/STATS.md
          
          TOTAL_PACKAGES=0
          
          for version in 3.22 3.21; do
            echo "## Alpine $version" >> deploy/STATS.md
            for arch in x86_64 armhf aarch64; do
              if [ -d "deploy/v$version/community/$arch" ]; then
                count=$(find "deploy/v$version/community/$arch" -name "*.apk" 2>/dev/null | wc -l)
                size=$(du -sh "deploy/v$version/community/$arch" 2>/dev/null | cut -f1)
                echo "- **$arch**: $count packages ($size)" >> deploy/STATS.md
                TOTAL_PACKAGES=$((TOTAL_PACKAGES + count))
              fi
            done
            echo "" >> deploy/STATS.md
          done
          
          echo "## Total" >> deploy/STATS.md
          echo "- **Total Packages**: $TOTAL_PACKAGES" >> deploy/STATS.md
          echo "- **Repository Size**: $(du -sh deploy 2>/dev/null | cut -f1)" >> deploy/STATS.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false  # Use false like the original to fully replace
          commit_message: |
            Add Raspberry Pi OS packages - ${{ github.event.inputs.raspios_dist }}
            Alpine ${{ github.event.inputs.alpine_version == 'all' && '3.22 and 3.21' || github.event.inputs.alpine_version }}
      
      - name: Purge Cloudflare Cache
        if: success()
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          # Purge APKINDEX files from Cloudflare cache
          if [ -n "$CLOUDFLARE_ZONE" ] && [ -n "$CLOUDFLARE_TOKEN" ]; then
            echo "Purging Cloudflare cache for APKINDEX files..."
            
            # Purge all APKINDEX files
            FILES_TO_PURGE='["https://apk.pistar.uk/v3.22/community/x86_64/APKINDEX.tar.gz","https://apk.pistar.uk/v3.22/community/armhf/APKINDEX.tar.gz","https://apk.pistar.uk/v3.22/community/aarch64/APKINDEX.tar.gz","https://apk.pistar.uk/v3.21/community/x86_64/APKINDEX.tar.gz","https://apk.pistar.uk/v3.21/community/armhf/APKINDEX.tar.gz","https://apk.pistar.uk/v3.21/community/aarch64/APKINDEX.tar.gz"]'
            
            RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/purge_cache" \
              -H "Authorization: Bearer $CLOUDFLARE_TOKEN" \
              -H "Content-Type: application/json" \
              --data "{\"files\":$FILES_TO_PURGE}")
            
            if echo "$RESPONSE" | grep -q '"success":true'; then
              echo "Successfully purged Cloudflare cache"
            else
              echo "Warning: Cloudflare cache purge may have failed"
              echo "Response: $RESPONSE"
            fi
          else
            echo "Cloudflare credentials not configured, skipping cache purge"
          fi