name: Check Source Package Updates

on:
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 4 AM UTC (after master pipeline at 2 AM)
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force rebuild even if no changes detected'
        required: false
        default: false
        type: boolean

concurrency:
  group: check-source-updates
  cancel-in-progress: true

jobs:
  check-updates:
    name: Check for Upstream Updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      packages_to_build: ${{ steps.check.outputs.packages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for upstream updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          echo "::group::Checking source package upstreams"

          # Force build skips the check
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "Force build requested"
            # List all source packages
            PACKAGES=$(find packages -maxdepth 2 -name APKBUILD -type f | while read f; do
              if grep -q "^giturl=" "$f"; then
                dirname "$f" | xargs basename
              fi
            done | sort -u | tr '\n' ' ')
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "::endgroup::"
            exit 0
          fi

          PACKAGES_TO_BUILD=""
          CHECKED=0
          UPDATED=0

          for apkbuild in packages/*/APKBUILD; do
            [ -f "$apkbuild" ] || continue

            PACKAGE=$(basename "$(dirname "$apkbuild")")
            GITURL=$(grep "^giturl=" "$apkbuild" | head -1 | cut -d'"' -f2)

            if [ -z "$GITURL" ]; then
              continue
            fi

            CHECKED=$((CHECKED + 1))

            # Get stored commit
            CURRENT_COMMIT=$(grep "^_gitcommit=" "$apkbuild" | cut -d'"' -f2)

            # Get latest commit from GitHub API
            REPO_PATH=$(echo "$GITURL" | sed 's|.*github.com/||' | sed 's|\.git$||')

            LATEST_COMMIT=""
            for branch in main master; do
              LATEST_COMMIT=$(curl -s -H "Accept: application/vnd.github.v3+json" \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/${REPO_PATH}/commits/${branch}" | \
                grep '"sha"' | head -1 | cut -d'"' -f4 | cut -c1-7)

              if [ -n "$LATEST_COMMIT" ]; then
                break
              fi
            done

            if [ -z "$LATEST_COMMIT" ]; then
              echo "Could not fetch latest commit for $PACKAGE"
              continue
            fi

            echo "$PACKAGE: current=${CURRENT_COMMIT:-unknown} latest=$LATEST_COMMIT"

            if [ "$CURRENT_COMMIT" != "$LATEST_COMMIT" ]; then
              echo "  -> UPDATE AVAILABLE"
              PACKAGES_TO_BUILD="$PACKAGES_TO_BUILD $PACKAGE"
              UPDATED=$((UPDATED + 1))
            else
              echo "  -> Up to date"
            fi
          done

          PACKAGES_TO_BUILD=$(echo "$PACKAGES_TO_BUILD" | xargs)

          echo ""
          echo "Checked: $CHECKED packages"
          echo "Updates: $UPDATED"

          if [ -n "$PACKAGES_TO_BUILD" ]; then
            echo "packages=$PACKAGES_TO_BUILD" >> $GITHUB_OUTPUT
            echo "has_updates=true" >> $GITHUB_OUTPUT

            echo "## Source Package Updates Available" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            for pkg in $PACKAGES_TO_BUILD; do
              echo "- \`$pkg\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "packages=" >> $GITHUB_OUTPUT
            echo "has_updates=false" >> $GITHUB_OUTPUT

            echo "## All Source Packages Up to Date" >> $GITHUB_STEP_SUMMARY
          fi

          echo "::endgroup::"

  update-and-build:
    name: Update Commits and Build
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update _gitcommit in APKBUILDs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGES: ${{ needs.check-updates.outputs.packages_to_build }}
        run: |
          set -e

          UPDATE_DETAILS=""

          for package in $PACKAGES; do
            APKBUILD="packages/${package}/APKBUILD"

            if [ ! -f "$APKBUILD" ]; then
              echo "Skipping $package - APKBUILD not found"
              continue
            fi

            GITURL=$(grep "^giturl=" "$APKBUILD" | head -1 | cut -d'"' -f2)
            if [ -z "$GITURL" ]; then
              continue
            fi

            CURRENT_COMMIT=$(grep "^_gitcommit=" "$APKBUILD" | cut -d'"' -f2)

            # Get latest commit
            REPO_PATH=$(echo "$GITURL" | sed 's|.*github.com/||' | sed 's|\.git$||')

            LATEST_COMMIT=""
            for branch in main master; do
              LATEST_COMMIT=$(curl -s -H "Accept: application/vnd.github.v3+json" \
                -H "Authorization: token ${GITHUB_TOKEN}" \
                "https://api.github.com/repos/${REPO_PATH}/commits/${branch}" | \
                grep '"sha"' | head -1 | cut -d'"' -f4 | cut -c1-7)

              if [ -n "$LATEST_COMMIT" ]; then
                break
              fi
            done

            if [ -z "$LATEST_COMMIT" ]; then
              echo "Skipping $package - could not fetch latest commit"
              continue
            fi

            echo "Updating $package: ${CURRENT_COMMIT:-unknown} -> $LATEST_COMMIT"
            sed -i "s/^_gitcommit=.*/_gitcommit=\"${LATEST_COMMIT}\"/" "$APKBUILD"
            UPDATE_DETAILS="${UPDATE_DETAILS}\n- ${package}: ${CURRENT_COMMIT:-unknown} -> ${LATEST_COMMIT}"
          done

          # Commit changes
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add packages/*/APKBUILD

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update source package commits [skip ci]"
            git push
            echo "Committed APKBUILD updates"
          fi

      - name: Trigger source package build
        uses: actions/github-script@v7
        with:
          script: |
            console.log('Triggering build-source-packages workflow');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-source-packages.yml',
              ref: 'main',
              inputs: {
                package: 'all',
                alpine_version: 'all'
              }
            });

            console.log('Build triggered successfully');

            await core.summary
              .addRaw('## Build Triggered\n\nTriggered `build-source-packages.yml` for all packages.')
              .write();
