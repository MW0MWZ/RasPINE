name: Check for Raspberry Pi OS Updates

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected'
        required: false
        type: boolean
        default: false

jobs:
  check-updates:
    name: Check for Raspberry Pi OS Updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
      kernel_version: ${{ steps.check.outputs.kernel_version }}
      firmware_date: ${{ steps.check.outputs.firmware_date }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for updates
        id: check
        run: |
          set -e
          
          echo "::group::Checking for Raspberry Pi OS updates"
          
          # Configuration
          REPO_BASE="http://archive.raspberrypi.org/debian"
          RASPIOS_DIST="bookworm"
          WORK_DIR="check-work"
          mkdir -p "$WORK_DIR"
          
          # Track if we found updates
          HAS_UPDATES=false
          
          # Check kernel versions for both architectures
          echo "Checking kernel versions..."
          LATEST_KERNEL=""
          
          for ARCH in armhf arm64; do
            echo "Checking $ARCH..."
            PACKAGES_URL="${REPO_BASE}/dists/${RASPIOS_DIST}/main/binary-${ARCH}/Packages.gz"
            
            if wget -q -O "${WORK_DIR}/Packages_${ARCH}.gz" "${PACKAGES_URL}"; then
              gunzip -f "${WORK_DIR}/Packages_${ARCH}.gz"
              
              # Find latest kernel version
              KERNEL=$(grep "^Package: linux-image-" "${WORK_DIR}/Packages_${ARCH}" | \
                sed -n 's/^Package: linux-image-\([0-9][0-9.]*+rpt[^-]*\)-rpi.*/\1/p' | \
                sort -V | tail -1)
              
              echo "  Latest kernel for $ARCH: $KERNEL"
              
              if [ -z "$LATEST_KERNEL" ] || [ "$KERNEL" != "$LATEST_KERNEL" ]; then
                LATEST_KERNEL="$KERNEL"
              fi
            fi
          done
          
          echo "Latest kernel version: $LATEST_KERNEL"
          
          # Extract numeric version for APK (e.g., 6.12.34 from 6.12.34+rpt)
          APK_VERSION=$(echo "$LATEST_KERNEL" | sed 's/+.*//' | sed 's/-.*//')
          echo "APK-compatible version: $APK_VERSION"
          
          # Check current versions in our packages
          CURRENT_KERNEL_VERSION=""
          CURRENT_FIRMWARE_VERSION=""
          
          # Check if we have existing APKBUILDs to compare
          if [ -f "packages/raspios-firmware/APKBUILD" ]; then
            CURRENT_FIRMWARE_VERSION=$(grep "^pkgver=" packages/raspios-firmware/APKBUILD | cut -d= -f2)
            echo "Current firmware version in APKBUILD: $CURRENT_FIRMWARE_VERSION"
          fi
          
          # Generate new firmware version based on date
          NEW_FIRMWARE_VERSION=$(date +%Y.%m.%d)
          
          # Compare versions
          echo ""
          echo "Version comparison:"
          echo "  Current firmware: ${CURRENT_FIRMWARE_VERSION:-none}"
          echo "  New firmware:     $NEW_FIRMWARE_VERSION"
          echo "  Latest kernel:    $LATEST_KERNEL ($APK_VERSION)"
          
          # Check if we need to update
          if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
            echo "Force update requested"
            HAS_UPDATES=true
          elif [ "$CURRENT_FIRMWARE_VERSION" != "$NEW_FIRMWARE_VERSION" ]; then
            echo "Firmware version needs update"
            HAS_UPDATES=true
          else
            echo "Checking if kernel packages need rebuild..."
            
            # Check if kernel packages exist in our repo
            # We should check the actual built packages, but for now check if date is today
            DAYS_SINCE_BUILD=$(( ($(date +%s) - $(date -d "$CURRENT_FIRMWARE_VERSION" +%s 2>/dev/null || echo 0)) / 86400 ))
            
            if [ $DAYS_SINCE_BUILD -gt 7 ]; then
              echo "Last build was $DAYS_SINCE_BUILD days ago, triggering update"
              HAS_UPDATES=true
            fi
          fi
          
          # Also check for any Raspberry Pi OS security updates or important changes
          # by checking the package repository's last modified date
          if curl -sI "${REPO_BASE}/dists/${RASPIOS_DIST}/Release" | grep -q "Last-Modified"; then
            REPO_MODIFIED=$(curl -sI "${REPO_BASE}/dists/${RASPIOS_DIST}/Release" | grep "Last-Modified" | cut -d' ' -f2-)
            echo "Repository last modified: $REPO_MODIFIED"
          fi
          
          # Output results
          echo "has_updates=$HAS_UPDATES" >> $GITHUB_OUTPUT
          echo "kernel_version=$LATEST_KERNEL" >> $GITHUB_OUTPUT
          echo "firmware_date=$NEW_FIRMWARE_VERSION" >> $GITHUB_OUTPUT
          
          if [ "$HAS_UPDATES" = "true" ]; then
            echo "📦 Updates detected! Will trigger build process."
          else
            echo "✅ No updates needed."
          fi
          
          echo "::endgroup::"

      - name: Update APKBUILD files
        if: steps.check.outputs.has_updates == 'true'
        run: |
          set -e
          
          echo "::group::Updating APKBUILD files"
          
          NEW_VERSION="${{ steps.check.outputs.firmware_date }}"
          KERNEL_VERSION="${{ steps.check.outputs.kernel_version }}"
          
          # Ensure the directory exists
          mkdir -p packages/raspios-firmware
          
          # Create updated APKBUILD for firmware
          cat > packages/raspios-firmware/APKBUILD << 'EOF'
          # Maintainer: Andy Taylor <andy@mw0mwz.co.uk>
          # Auto-updated by GitHub Actions
          pkgname=raspios-firmware
          pkgver=$NEW_VERSION
          pkgrel=0
          pkgdesc="Raspberry Pi firmware and boot configuration"
          url="https://www.raspberrypi.org/"
          arch="armhf aarch64"
          license="custom"
          depends=""
          makedepends=""
          subpackages=""
          source="
              config.txt
              cmdline.txt
          "
          options="!check !strip !tracedeps !fhs"
          
          package() {
              # Install config files to /boot/firmware
              install -Dm644 "$srcdir/config.txt" "$pkgdir/boot/firmware/config.txt"
              install -Dm644 "$srcdir/cmdline.txt" "$pkgdir/boot/firmware/cmdline.txt"
              
              # Create /boot directory for symlinks
              mkdir -p "$pkgdir/boot"
              
              # Create symlinks in /boot pointing to /boot/firmware
              cd "$pkgdir/boot"
              ln -s firmware/config.txt config.txt
              ln -s firmware/cmdline.txt cmdline.txt
          }
          
          sha512sums="
          SKIP
          SKIP
          "
          EOF
          
          # Fix the version variable substitution
          sed -i "s/\$NEW_VERSION/$NEW_VERSION/" packages/raspios-firmware/APKBUILD
          
          echo "Updated APKBUILD with version $NEW_VERSION"
          
          # Create a version tracking file
          cat > packages/raspios-firmware/VERSION << EOF
          FIRMWARE_VERSION=$NEW_VERSION
          KERNEL_VERSION=$KERNEL_VERSION
          UPDATED=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          EOF
          
          echo "::endgroup::"

      - name: Commit changes
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add packages/raspios-firmware/APKBUILD
          git add packages/raspios-firmware/VERSION 2>/dev/null || true
          
          KERNEL_VERSION="${{ steps.check.outputs.kernel_version }}"
          
          git commit -m "Auto-update: Raspberry Pi OS packages

          - Kernel version: $KERNEL_VERSION
          - Firmware date: ${{ steps.check.outputs.firmware_date }}
          - Automated weekly check found updates
          
          [skip ci]" || echo "No changes to commit"
          
          git push || echo "No changes to push"

  trigger-builds:
    name: Trigger Package Builds
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger RasPiOS package build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Trigger the package build workflow
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-raspios-packages.yml',
              ref: 'main',
              inputs: {
                raspios_dist: 'bookworm',
                alpine_version: 'all',
                package_types: 'all'
              }
            });
            
            console.log('✅ Triggered RasPiOS package build workflow');
            
            // Wait a moment before triggering the image build
            await new Promise(r => setTimeout(r, 5000));
            
            // Also trigger the RasPINE image build
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-raspine.yml',
              ref: 'main',
              inputs: {
                debug_enabled: false
              }
            });
            
            console.log('✅ Triggered RasPINE image build workflow');
            