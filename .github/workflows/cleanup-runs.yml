name: Cleanup Old Workflow Runs

on:
  schedule:
    # Run weekly on Sunday at 04:00 UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete old workflow runs
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const now = Date.now();
            const msPerDay = 86400000;
            const successMaxAge = 5 * msPerDay;
            const failureMaxAge = 30 * msPerDay;

            let deleted = 0;
            let kept = 0;

            // Paginate through all workflow runs
            for await (const response of github.paginate.iterator(
              github.rest.actions.listWorkflowRunsForRepo,
              { owner, repo, per_page: 100 }
            )) {
              for (const run of response.data) {
                const runAge = now - new Date(run.created_at).getTime();
                const isSuccess = run.conclusion === 'success';
                const maxAge = isSuccess ? successMaxAge : failureMaxAge;

                if (runAge > maxAge) {
                  console.log(`Deleting run #${run.id} (${run.name}) - ${run.conclusion} - ${run.created_at}`);
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner, repo, run_id: run.id
                    });
                    deleted++;
                  } catch (e) {
                    console.log(`  Failed to delete: ${e.message}`);
                  }
                } else {
                  kept++;
                }
              }
            }

            console.log(`\nCleanup complete: deleted ${deleted} runs, kept ${kept} runs`);
