name: Build Source Packages

on:
  workflow_call:
    inputs:
      package:
        description: 'Package to build (or "all" for all packages)'
        required: false
        default: 'all'
        type: string
      alpine_version:
        description: 'Alpine version (or "all" for all versions)'
        required: false
        default: 'all'
        type: string
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build (or "all" for all packages)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - wiringpi
      alpine_version:
        description: 'Alpine version (or "all" for all versions)'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - '3.22'
          - '3.21'

concurrency:
  group: build-source-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      alpine_versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Determine Alpine versions to build
        id: versions
        run: |
          if [ "${{ inputs.alpine_version }}" = "all" ] || [ -z "${{ inputs.alpine_version }}" ]; then
            echo 'versions=["3.22","3.21"]' >> $GITHUB_OUTPUT
          else
            echo 'versions=["${{ inputs.alpine_version }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.arch }} for Alpine ${{ matrix.alpine_version }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [armhf, aarch64]
        alpine_version: ${{ fromJson(needs.prepare.outputs.alpine_versions) }}
        include:
          - arch: armhf
            platform: linux/arm/v6
          - arch: aarch64
            platform: linux/arm64
      max-parallel: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout gh-pages for version checking
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-check
        continue-on-error: true

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine packages to build
        id: packages
        run: |
          if [ "${{ inputs.package }}" = "all" ] || [ -z "${{ inputs.package }}" ]; then
            PACKAGES=$(find packages -maxdepth 2 -name APKBUILD -type f | while read f; do
              dirname "$f" | xargs basename
            done | sort -u | tr '\n' ' ')
          else
            PACKAGES="${{ inputs.package }}"
          fi
          echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
          echo "Building packages: $PACKAGES"

      - name: Build packages
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          ARCH: ${{ matrix.arch }}
          PLATFORM: ${{ matrix.platform }}
          ALPINE_VERSION: ${{ matrix.alpine_version }}
        run: |
          set -e

          OUTPUT_DIR="repo/v${ALPINE_VERSION}/community/${ARCH}"
          mkdir -p "$OUTPUT_DIR"

          for PACKAGE in ${{ steps.packages.outputs.packages }}; do
            echo "::group::Building $PACKAGE for $ARCH"

            PACKAGE_DIR="packages/$PACKAGE"
            if [ ! -d "$PACKAGE_DIR" ]; then
              echo "Package directory $PACKAGE_DIR not found, skipping..."
              echo "::endgroup::"
              continue
            fi

            # Check if this package supports our architecture
            PKG_ARCH=$(grep "^arch=" "$PACKAGE_DIR/APKBUILD" | head -1 | cut -d'"' -f2)
            if [ -n "$PKG_ARCH" ] && [ "$PKG_ARCH" != "all" ]; then
              if ! echo "$PKG_ARCH" | grep -qw "$ARCH"; then
                echo "Package $PACKAGE does not support $ARCH (supports: $PKG_ARCH), skipping..."
                echo "::endgroup::"
                continue
              fi
            fi

            TEMP_DIR=$(mktemp -d)

            # Get primary git URL from APKBUILD
            GITURL=$(grep "^giturl=" "$PACKAGE_DIR/APKBUILD" | head -1 | cut -d'"' -f2)

            if [ -z "$GITURL" ]; then
              echo "No giturl found in APKBUILD for $PACKAGE, skipping..."
              rm -rf "$TEMP_DIR"
              echo "::endgroup::"
              continue
            fi

            echo "Git URL: $GITURL"

            # Clone and get version info
            git clone --depth 50 "$GITURL" "$TEMP_DIR/repo"
            cd "$TEMP_DIR/repo"
            GIT_COMMIT=$(git rev-parse --short HEAD)
            COMMIT_DATE=$(git show -s --format=%cd --date=format:'%Y.%m.%d' HEAD)
            cd - > /dev/null
            PKG_VERSION="${COMMIT_DATE}"

            # Determine release number by checking ALL architectures and Alpine versions
            PKG_RELEASE="0"

            for CHECK_VERSION in 3.22 3.21; do
              for CHECK_ARCH in armhf aarch64; do
                # Check existing packages in gh-pages
                GH_PAGES_DIR="gh-pages-check/v${CHECK_VERSION}/community/${CHECK_ARCH}"
                if [ -d "$GH_PAGES_DIR" ]; then
                  for PKG_FILE in $(ls -1 "$GH_PAGES_DIR/${PACKAGE}-${PKG_VERSION}-r"*.apk 2>/dev/null | sort -V); do
                    RELEASE_NUM=$(echo "$PKG_FILE" | sed -n "s/.*-r\([0-9]*\)\.apk/\1/p")
                    if [ -n "$RELEASE_NUM" ] && [ "$RELEASE_NUM" -ge "$PKG_RELEASE" ]; then
                      PKG_RELEASE=$RELEASE_NUM
                    fi
                  done
                fi

                # Also check what we've already built in this run
                CHECK_OUTPUT_DIR="repo/v${CHECK_VERSION}/community/${CHECK_ARCH}"
                if [ -d "$CHECK_OUTPUT_DIR" ]; then
                  for PKG_FILE in $(ls -1 "$CHECK_OUTPUT_DIR/${PACKAGE}-${PKG_VERSION}-r"*.apk 2>/dev/null | sort -V); do
                    RELEASE_NUM=$(echo "$PKG_FILE" | sed -n "s/.*-r\([0-9]*\)\.apk/\1/p")
                    if [ -n "$RELEASE_NUM" ] && [ "$RELEASE_NUM" -ge "$PKG_RELEASE" ]; then
                      PKG_RELEASE=$RELEASE_NUM
                    fi
                  done
                fi
              done
            done

            # Increment the release number for this new build
            PKG_RELEASE=$((PKG_RELEASE + 1))

            echo "Package version: ${PKG_VERSION}-r${PKG_RELEASE}"
            echo "Git commit: ${GIT_COMMIT}"

            # Copy and update APKBUILD
            cp "$PACKAGE_DIR/APKBUILD" "$TEMP_DIR/"
            sed -i "s/^pkgver=.*/pkgver=${PKG_VERSION}/" "$TEMP_DIR/APKBUILD"
            sed -i "s/^pkgrel=.*/pkgrel=${PKG_RELEASE}/" "$TEMP_DIR/APKBUILD"
            sed -i "s/^_gitcommit=.*/_gitcommit=\"${GIT_COMMIT}\"/" "$TEMP_DIR/APKBUILD"

            # Copy supporting files (patches, init scripts, etc.)
            for file in "$PACKAGE_DIR"/*.initd "$PACKAGE_DIR"/*.confd "$PACKAGE_DIR"/*.pre-install "$PACKAGE_DIR"/*.post-install "$PACKAGE_DIR"/*.pre-upgrade "$PACKAGE_DIR"/*.post-upgrade "$PACKAGE_DIR"/*.pre-deinstall "$PACKAGE_DIR"/*.post-deinstall "$PACKAGE_DIR"/*.patch; do
              if [ -f "$file" ]; then
                echo "Copying supporting file: $(basename "$file")"
                cp "$file" "$TEMP_DIR/"
              fi
            done

            # Setup signing key
            echo "$APK_PRIVATE_KEY" > "$TEMP_DIR/raspine.rsa"
            cp keys/raspine.rsa.pub "$TEMP_DIR/"

            # Build in Docker
            docker run --rm \
              --platform "$PLATFORM" \
              -v "$TEMP_DIR:/build:ro" \
              -v "$(pwd)/$OUTPUT_DIR:/output" \
              "alpine:${ALPINE_VERSION}" \
              sh -c '
                set -e
                echo "https://dl-cdn.alpinelinux.org/alpine/v'${ALPINE_VERSION}'/community" >> /etc/apk/repositories
                apk update
                apk add --no-cache alpine-sdk sudo git file
                adduser -D builder
                addgroup builder abuild
                echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

                # Copy all files from build directory to builder home
                cp -r /build/* /home/builder/
                chown -R builder:builder /home/builder/

                # Setup abuild keys
                mkdir -p /home/builder/.abuild
                cp /home/builder/raspine.rsa /home/builder/.abuild/
                cp /home/builder/raspine.rsa.pub /home/builder/.abuild/
                echo "PACKAGER_PRIVKEY=\"/home/builder/.abuild/raspine.rsa\"" > /home/builder/.abuild/abuild.conf

                # Install public key for verification
                cp /home/builder/raspine.rsa.pub /etc/apk/keys/

                cd /home/builder

                # Run abuild
                if ! su builder -c "abuild -r"; then
                  echo "::error::abuild failed for package"
                  if [ -d /home/builder/src ]; then
                    find /home/builder/src -name "*.log" -type f -exec tail -50 {} \; 2>/dev/null || true
                  fi
                  exit 1
                fi

                # Copy built packages to output
                echo "Processing built packages..."
                find /home/builder/packages -name "*.apk" -type f | while read pkg; do
                  PKG_NAME=$(basename "$pkg")
                  echo "  -> Copying: $PKG_NAME"
                  cp "$pkg" /output/
                done

                echo "Packages in output:"
                ls -la /output/*.apk 2>/dev/null || echo "  No packages"
              '

            rm -rf "$TEMP_DIR"

            echo "::endgroup::"
          done

          echo "Built packages in $OUTPUT_DIR:"
          ls -la "$OUTPUT_DIR"/*.apk 2>/dev/null || echo "No packages found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: source-packages-alpine${{ matrix.alpine_version }}-${{ matrix.arch }}
          path: repo/
          retention-days: 7

  deploy:
    name: Deploy Source Packages
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Clone existing gh-pages
        run: |
          echo "::group::Setting up gh-pages branch"

          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            echo "Cloning existing gh-pages branch..."
            git clone --branch gh-pages --depth 1 \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
              deploy

            cd deploy

            echo "Current repository size: $(du -sh . | cut -f1)"
            echo "APK files: $(find . -name '*.apk' | wc -l)"

            # Clean up .git for fresh push
            if [ -d .git ]; then
              rm -rf .git
              git init
              git checkout -b gh-pages
            fi

            cd ..
          else
            echo "Creating new gh-pages branch..."
            mkdir deploy
            cd deploy
            git init
            git checkout -b gh-pages
            cd ..
          fi

          echo "::endgroup::"

      - name: Cleanup old source packages
        run: |
          echo "::group::Cleaning existing source packages"

          cd deploy

          # For each source package type, keep only the newest version
          for dir in v*/community/*; do
            [ -d "$dir" ] || continue

            echo "Cleaning $dir..."
            (
              cd "$dir"

              # Clean source package types (keep only newest by timestamp)
              # Use [0-9] anchor so "wiringpi-" doesn't also match "wiringpi-dev-"
              for prefix in wiringpi wiringpi-dev; do
                NEWEST=$(ls -t ${prefix}-[0-9]*.apk 2>/dev/null | head -1)

                if [ -n "$NEWEST" ]; then
                  ls ${prefix}-[0-9]*.apk 2>/dev/null | grep -v "^${NEWEST}$" | while read OLD; do
                    echo "  Removing: $OLD"
                    rm -f "$OLD"
                  done
                  echo "  Kept: $NEWEST"
                fi
              done
            )
          done

          cd ..

          echo "::endgroup::"

      - name: Merge new packages
        run: |
          echo "::group::Merging new packages"

          cd deploy

          for artifact_dir in ../artifacts/source-packages-*; do
            [ -d "$artifact_dir" ] || continue

            artifact_name=$(basename "$artifact_dir")
            echo "Processing $artifact_name..."

            alpine_version=$(echo "$artifact_name" | sed -n 's/.*alpine\([0-9.]*\)-.*/\1/p')
            arch=$(echo "$artifact_name" | sed -n 's/.*-\(armhf\|aarch64\)$/\1/p')

            [ -z "$alpine_version" ] || [ -z "$arch" ] && continue

            TARGET_DIR="v${alpine_version}/community/${arch}"
            mkdir -p "$TARGET_DIR"

            if [ -d "$artifact_dir/v${alpine_version}/community/${arch}" ]; then
              cp -f "$artifact_dir/v${alpine_version}/community/${arch}"/*.apk "$TARGET_DIR/" 2>/dev/null || true
            fi
          done

          cd ..

          echo "::endgroup::"

      - name: Final cleanup - keep only newest packages
        run: |
          echo "::group::Final cleanup"

          cd deploy

          for dir in v*/community/*; do
            [ -d "$dir" ] || continue

            echo "Final cleanup in $dir..."
            (
              cd "$dir"

              # Clean all known package prefixes (kernel packages + source packages)
              # Use [0-9] anchor so e.g. "wiringpi-" doesn't also match "wiringpi-dev-"
              for prefix in raspios-kernel-v6 raspios-kernel-v7 raspios-kernel-v8 raspios-firmware raspios-kernel-headers-common raspios-bootloader wiringpi wiringpi-dev; do
                NEWEST=$(ls -t ${prefix}-[0-9]*.apk 2>/dev/null | head -1)

                if [ -n "$NEWEST" ]; then
                  ls ${prefix}-[0-9]*.apk 2>/dev/null | grep -v "^${NEWEST}$" | xargs -r rm -f
                fi
              done
            )
          done

          echo ""
          echo "Package directories:"
          for dir in v*/community/*; do
            if [ -d "$dir" ]; then
              COUNT=$(ls "$dir"/*.apk 2>/dev/null | wc -l || echo 0)
              SIZE=$(du -sh "$dir" | cut -f1)
              echo "  $dir: $COUNT packages, $SIZE"
            fi
          done

          cd ..

          echo "::endgroup::"

      - name: Generate APKINDEX
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          echo "::group::Generating APKINDEX"

          [ -z "$APK_PRIVATE_KEY" ] && echo "ERROR: APK_PRIVATE_KEY not set!" && exit 1

          cd deploy

          mkdir -p keys
          echo "$APK_PRIVATE_KEY" > keys/raspine.rsa
          cp ../keys/raspine.rsa.pub keys/raspine.rsa.pub
          chmod 600 keys/raspine.rsa
          chmod 644 keys/raspine.rsa.pub

          for ver in 3.22 3.21; do
            for arch in armhf aarch64; do
              REPO="v${ver}/community/${arch}"
              [ ! -d "$REPO" ] && continue

              PKG_COUNT=$(ls "$REPO"/*.apk 2>/dev/null | wc -l || echo 0)
              [ "$PKG_COUNT" -eq 0 ] && continue

              echo "Generating APKINDEX for $REPO ($PKG_COUNT packages)..."

              # Sign unsigned packages
              for apk in "$REPO"/*.apk; do
                [ -f "$apk" ] || continue

                if ! tar -tzf "$apk" 2>/dev/null | grep -q "^\.SIGN\.RSA\."; then
                  echo "  Signing $(basename $apk)..."
                  docker run --rm \
                    -v "$(pwd)/$REPO:/repo" \
                    -v "$(pwd)/keys:/keys:ro" \
                    alpine:${ver} \
                    sh -c "apk add --no-cache alpine-sdk && cd /repo && abuild-sign -k /keys/raspine.rsa $(basename $apk)"
                fi
              done

              # Generate APKINDEX
              docker run --rm \
                -v "$(pwd)/$REPO:/repo" \
                -v "$(pwd)/keys:/keys:ro" \
                alpine:${ver} \
                sh -c "
                  apk add --no-cache alpine-sdk && \
                  cp /keys/raspine.rsa.pub /etc/apk/keys/ && \
                  cd /repo && \
                  rm -f APKINDEX.tar.gz APKINDEX.unsigned.tar.gz && \
                  apk index -o APKINDEX.unsigned.tar.gz *.apk && \
                  abuild-sign -k /keys/raspine.rsa APKINDEX.unsigned.tar.gz && \
                  mv APKINDEX.unsigned.tar.gz APKINDEX.tar.gz
                "
            done
          done

          rm -rf keys
          cd ..

          echo "::endgroup::"

      - name: Add metadata files
        run: |
          cd deploy

          touch .nojekyll
          [ -f ../index.html ] && cp ../index.html .
          [ -f ../keys/raspine.rsa.pub ] && cp ../keys/raspine.rsa.pub .
          [ -f ../CNAME ] && cp ../CNAME .

          # Update packages.json - detect kernel version from existing packages
          KERNEL_VERSION=""
          for kernel_pkg in v*/community/*/raspios-kernel-v*.apk; do
            if [ -f "$kernel_pkg" ]; then
              KERNEL_VERSION=$(basename "$kernel_pkg" | sed -n 's/raspios-kernel-v[0-9]*-\([0-9.]*\)-r[0-9]*.apk/\1/p')
              [ -n "$KERNEL_VERSION" ] && break
            fi
          done

          cat > packages.json << EOF
          {
            "repository": "RasPINE APK Repository",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "alpine_versions": ["3.22", "3.21"],
            "architectures": ["armhf", "aarch64"],
            "kernel_version": "${KERNEL_VERSION:-unknown}"
          }
          EOF

          cd ..

      - name: Deploy to GitHub Pages
        run: |
          echo "::group::Deploying to GitHub Pages"

          cd deploy

          TOTAL_SIZE_MB=$(du -sm . | cut -f1)
          TOTAL_PACKAGES=$(find . -name "*.apk" | wc -l)

          echo "Deploying: ${TOTAL_SIZE_MB}MB with ${TOTAL_PACKAGES} packages"

          git add -A

          if git diff --staged --quiet; then
            echo "No changes to deploy"
            exit 0
          fi

          git commit -m "Deploy source packages - $(date +'%Y-%m-%d %H:%M:%S UTC')

          Size: ${TOTAL_SIZE_MB}MB
          Packages: ${TOTAL_PACKAGES}"

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages --force

          cd ..

          echo "::endgroup::"

      - name: Purge Cloudflare cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          [ -z "$CLOUDFLARE_ZONE_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ] && exit 0

          curl -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{
              "prefixes": [
                "https://raspine.pistar.uk/",
                "http://raspine.pistar.uk/"
              ]
            }' \
            -s -o /dev/null

          echo "Cloudflare cache purged for raspine.pistar.uk"
