name: Check and Build RasPINE

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      force_update:
        type: boolean
        description: 'Force update even if no changes detected'
        required: false
        default: false

# Prevent concurrent runs
concurrency:
  group: raspine-build
  cancel-in-progress: false

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      kernel_updated: ${{ steps.check.outputs.kernel_updated }}
      package_updated: ${{ steps.check.outputs.package_updated }}
      needs_build: ${{ steps.check.outputs.needs_build }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check for updates
      id: check
      run: |
        # Check for kernel updates from Raspberry Pi OS
        echo "Checking for kernel updates..."
        KERNEL_UPDATED=false
        
        # Check latest kernel version from Raspberry Pi OS repo
        LATEST_KERNEL=$(curl -s https://archive.raspberrypi.org/debian/dists/bookworm/main/binary-armhf/Packages.gz | \
                        gunzip | grep -A 10 "^Package: raspberrypi-kernel$" | \
                        grep "^Version:" | cut -d' ' -f2 | head -1)
        
        # Compare with stored version
        if [ -f .last_kernel_version ]; then
          LAST_KERNEL=$(cat .last_kernel_version)
          if [ "$LATEST_KERNEL" != "$LAST_KERNEL" ]; then
            KERNEL_UPDATED=true
            echo "Kernel update detected: $LAST_KERNEL -> $LATEST_KERNEL"
          fi
        else
          KERNEL_UPDATED=true
          echo "No previous kernel version found, marking as updated"
        fi
        
        echo "$LATEST_KERNEL" > .last_kernel_version
        
        # Check if force update requested
        if [ "${{ github.event.inputs.force_update }}" = "true" ]; then
          echo "Force update requested"
          NEEDS_BUILD=true
        elif [ "$KERNEL_UPDATED" = "true" ]; then
          NEEDS_BUILD=true
        else
          NEEDS_BUILD=false
        fi
        
        echo "kernel_updated=$KERNEL_UPDATED" >> $GITHUB_OUTPUT
        echo "package_updated=false" >> $GITHUB_OUTPUT
        echo "needs_build=$NEEDS_BUILD" >> $GITHUB_OUTPUT

  convert-packages:
    needs: check-updates
    if: needs.check-updates.outputs.kernel_updated == 'true' || github.event.inputs.force_update == 'true'
    runs-on: ubuntu-latest
    outputs:
      conversion_complete: ${{ steps.convert.outputs.complete }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Run package conversion
      id: convert
      run: |
        echo "Running deb to apk conversion workflow..."
        # This would trigger your package conversion workflow
        # For now, just mark as complete
        echo "complete=true" >> $GITHUB_OUTPUT
    
    # Add your package conversion steps here

  build-image:
    needs: [check-updates, convert-packages]
    if: needs.check-updates.outputs.needs_build == 'true'
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.date.outputs.date }}
      image_built: ${{ steps.build.outputs.success }}
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set build date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
    
    - name: Build RasPINE image
      id: build
      run: |
        echo "Building RasPINE image..."
        # Run your full image build process here
        # This would include all the steps from your main build workflow
        echo "success=true" >> $GITHUB_OUTPUT
    
    # Include all your image build steps here

  update-gh-pages:
    needs: [convert-packages, build-image]
    if: always() && (needs.convert-packages.outputs.conversion_complete == 'true' || needs.build-image.outputs.image_built == 'true')
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
    
    - name: Prepare gh-pages update
      run: |
        # Clone or create gh-pages branch
        if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
          echo "Cloning existing gh-pages branch..."
          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            gh-pages-deploy
        else
          echo "Creating new gh-pages branch..."
          mkdir gh-pages-deploy
          cd gh-pages-deploy
          git init
          git checkout -b gh-pages
          cd ..
        fi
        
        # Prepare directories
        mkdir -p gh-pages-deploy/{downloads,packages,assets}
        
        # Add .nojekyll to prevent Jekyll processing
        touch gh-pages-deploy/.nojekyll
        
        # Create main index
        cat > gh-pages-deploy/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>RasPINE - Raspberry Pi Alpine System</title>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    background: linear-gradient(135deg, #0f1419 0%, #1a202c 100%);
                    color: #e2e8f0;
                    min-height: 100vh;
                    margin: 0;
                    padding: 40px 20px;
                }
                .container {
                    max-width: 1200px;
                    margin: 0 auto;
                }
                h1 { 
                    color: #4a8fb9; 
                    font-size: 3em;
                    margin-bottom: 0.5em;
                }
                .subtitle {
                    font-size: 1.2em;
                    opacity: 0.9;
                    margin-bottom: 2em;
                }
                .grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 20px;
                    margin-top: 40px;
                }
                .card {
                    background: rgba(26, 32, 44, 0.8);
                    border-radius: 10px;
                    padding: 30px;
                    border: 1px solid #2d3748;
                    transition: transform 0.2s, box-shadow 0.2s;
                }
                .card:hover {
                    transform: translateY(-5px);
                    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
                }
                .card h2 {
                    color: #4a8fb9;
                    margin-top: 0;
                }
                .card p {
                    opacity: 0.9;
                    line-height: 1.6;
                }
                a { 
                    color: #4a8fb9; 
                    text-decoration: none;
                    font-weight: 500;
                }
                a:hover { 
                    text-decoration: underline; 
                }
                .btn {
                    display: inline-block;
                    padding: 10px 20px;
                    background: #4a8fb9;
                    color: white;
                    border-radius: 5px;
                    margin-top: 15px;
                    transition: background 0.2s;
                }
                .btn:hover {
                    background: #3a7fa9;
                    text-decoration: none;
                }
                .status {
                    margin-top: 40px;
                    padding: 20px;
                    background: rgba(74, 143, 185, 0.1);
                    border-radius: 10px;
                    border: 1px solid #4a8fb9;
                }
                .status-item {
                    display: flex;
                    justify-content: space-between;
                    margin: 10px 0;
                }
                @media (max-width: 768px) {
                    h1 { font-size: 2em; }
                    .grid { grid-template-columns: 1fr; }
                }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>🏔️ RasPINE</h1>
                <p class="subtitle">Raspberry Pi OS kernel with Alpine Linux userland</p>
                
                <div class="grid">
                    <div class="card">
                        <h2>📥 Downloads</h2>
                        <p>Get the latest RasPINE image for your Raspberry Pi.</p>
                        <a href="/downloads/" class="btn">Download Latest</a>
                    </div>
                    
                    <div class="card">
                        <h2>📦 Package Repository</h2>
                        <p>APK packages optimized for RasPINE systems.</p>
                        <a href="/packages/" class="btn">Browse Packages</a>
                    </div>
                    
                    <div class="card">
                        <h2>📚 Documentation</h2>
                        <p>Learn how to install, configure, and use RasPINE.</p>
                        <a href="https://github.com/${{ github.repository }}" class="btn">View Docs</a>
                    </div>
                    
                    <div class="card">
                        <h2>💻 Source Code</h2>
                        <p>Contribute to RasPINE development on GitHub.</p>
                        <a href="https://github.com/${{ github.repository }}" class="btn">View Source</a>
                    </div>
                </div>
                
                <div class="status">
                    <h3>System Status</h3>
                    <div class="status-item">
                        <span>Latest Build:</span>
                        <span>${{ needs.build-image.outputs.build_date || 'N/A' }}</span>
                    </div>
                    <div class="status-item">
                        <span>Alpine Version:</span>
                        <span>3.22</span>
                    </div>
                    <div class="status-item">
                        <span>Architecture:</span>
                        <span>armhf (32-bit)</span>
                    </div>
                    <div class="status-item">
                        <span>Last Updated:</span>
                        <span>$(date -u '+%Y-%m-%d %H:%M UTC')</span>
                    </div>
                </div>
            </div>
        </body>
        </html>
        EOF
    
    - name: Update package repository
      if: needs.convert-packages.outputs.conversion_complete == 'true'
      run: |
        echo "Updating package repository section..."
        # Add your package repository update logic here
        
        cat > gh-pages-deploy/packages/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <title>RasPINE Package Repository</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    background: linear-gradient(135deg, #0f1419 0%, #1a202c 100%);
                    color: #e2e8f0;
                    padding: 40px;
                }
                h1 { color: #4a8fb9; }
                .info { 
                    background: rgba(26, 32, 44, 0.8);
                    padding: 20px;
                    border-radius: 10px;
                    margin: 20px 0;
                }
                a { color: #4a8fb9; text-decoration: none; }
            </style>
        </head>
        <body>
            <h1>📦 RasPINE Package Repository</h1>
            <div class="info">
                <h2>Repository Configuration</h2>
                <p>Add to /etc/apk/repositories:</p>
                <pre>https://raspine.pistar.uk/v3.22/community</pre>
                <p>Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')</p>
            </div>
            <div class="info">
                <p><a href="/">← Back to main page</a></p>
            </div>
        </body>
        </html>
        EOF
    
    - name: Update image downloads
      if: needs.build-image.outputs.image_built == 'true'
      run: |
        echo "Updating image downloads section..."
        BUILD_DATE="${{ needs.build-image.outputs.build_date }}"
        
        # Create download redirect
        cat > gh-pages-deploy/downloads/RasPINE-${BUILD_DATE}.img.xz.html << EOF
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>Downloading RasPINE-${BUILD_DATE}.img.xz</title>
            <meta http-equiv="refresh" content="0; url=https://github.com/${{ github.repository }}/releases/download/v${BUILD_DATE}/RasPINE-${BUILD_DATE}.img.xz">
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    background: linear-gradient(135deg, #0f1419 0%, #1a202c 100%);
                    color: #e2e8f0;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    min-height: 100vh;
                    margin: 0;
                }
                .container {
                    text-align: center;
                    padding: 40px;
                    background: rgba(26, 32, 44, 0.8);
                    border-radius: 15px;
                }
                a {
                    color: #4a8fb9;
                    padding: 10px 20px;
                    border: 2px solid #4a8fb9;
                    border-radius: 8px;
                    display: inline-block;
                    margin-top: 20px;
                    text-decoration: none;
                }
                a:hover {
                    background: #4a8fb9;
                    color: white;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>📥 Downloading RasPINE Image</h1>
                <p>Your download should start automatically...</p>
                <a href="https://github.com/${{ github.repository }}/releases/download/v${BUILD_DATE}/RasPINE-${BUILD_DATE}.img.xz">
                    Click here if download doesn't start
                </a>
            </div>
        </body>
        </html>
        EOF
        
        # Update latest symlink
        cd gh-pages-deploy/downloads
        ln -sf "RasPINE-${BUILD_DATE}.img.xz.html" "RasPINE-latest.img.xz.html"
        cd ../..
        
        # Create downloads index
        cat > gh-pages-deploy/downloads/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <title>RasPINE Downloads</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    background: linear-gradient(135deg, #0f1419 0%, #1a202c 100%);
                    color: #e2e8f0;
                    padding: 40px;
                }
                h1 { color: #4a8fb9; }
                .download-card {
                    background: rgba(26, 32, 44, 0.8);
                    border-radius: 10px;
                    padding: 20px;
                    margin: 20px 0;
                }
                a { color: #4a8fb9; text-decoration: none; }
                a:hover { text-decoration: underline; }
                .btn {
                    display: inline-block;
                    padding: 10px 20px;
                    background: #4a8fb9;
                    color: white;
                    border-radius: 5px;
                    margin: 10px 10px 10px 0;
                }
                .btn:hover {
                    background: #3a7fa9;
                    text-decoration: none;
                }
            </style>
        </head>
        <body>
            <h1>🏔️ RasPINE Downloads</h1>
            <div class="download-card">
                <h2>Latest Build: ${{ needs.build-image.outputs.build_date }}</h2>
                <a href="RasPINE-latest.img.xz.html" class="btn">📥 Download Image</a>
                <a href="https://github.com/${{ github.repository }}/releases/latest" class="btn">📋 Release Notes</a>
            </div>
            <div class="download-card">
                <h2>All Releases</h2>
                <p><a href="https://github.com/${{ github.repository }}/releases">View all releases on GitHub →</a></p>
                <p><a href="/">← Back to main page</a></p>
            </div>
        </body>
        </html>
        EOF
    
    - name: Commit and push to gh-pages
      run: |
        cd gh-pages-deploy
        
        # Add safety files
        echo "*.img.xz" > .gitignore
        echo "*.apk" >> .gitignore
        echo "*.deb" >> .gitignore
        
        git add .
        
        # Determine commit message
        COMMIT_MSG="Update GitHub Pages"
        if [ "${{ needs.convert-packages.outputs.conversion_complete }}" = "true" ] && [ "${{ needs.build-image.outputs.image_built }}" = "true" ]; then
          COMMIT_MSG="Update packages and image downloads for ${{ needs.build-image.outputs.build_date }}"
        elif [ "${{ needs.convert-packages.outputs.conversion_complete }}" = "true" ]; then
          COMMIT_MSG="Update package repository"
        elif [ "${{ needs.build-image.outputs.image_built }}" = "true" ]; then
          COMMIT_MSG="Update image downloads for ${{ needs.build-image.outputs.build_date }}"
        fi
        
        git commit -m "$COMMIT_MSG" || {
          echo "No changes to commit"
          exit 0
        }
        
        # Push with retry and conflict resolution
        for i in {1..5}; do
          echo "Push attempt $i..."
          
          # If remote exists, pull and rebase
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git pull --rebase origin gh-pages || {
              echo "Rebase failed, trying merge strategy..."
              git rebase --abort 2>/dev/null || true
              git pull --strategy=ours origin gh-pages || true
            }
          fi
          
          if git push origin gh-pages; then
            echo "Successfully pushed to gh-pages"
            exit 0
          fi
          
          echo "Push failed, waiting before retry..."
          sleep $((i * 3))
        done
        
        echo "Failed to push after 5 attempts"
        exit 1

  deploy-pages:
    needs: update-gh-pages
    if: success()
    runs-on: ubuntu-latest
    
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4